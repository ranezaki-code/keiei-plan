<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>経営計画管理システム v25</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box}
:root{
  --accent:#7c3aed; --accent-lt:#ede9fe; --gray:#6b7280; --gray-lt:#f3f4f6;
  --border:#e5e7eb; --bg:#f9fafb; --ok:#16a34a; --ng:#dc2626; --warn:#ea580c;
  --shadow:0 1px 2px rgba(0,0,0,.04);
}
html,body{margin:0;padding:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:#111827;font-size:13px;line-height:1.55}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;padding:5px 7px;border:1px solid var(--border);border-radius:5px;background:#fff;width:100%}
input[type=number]{text-align:right}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{border:1px solid var(--border);padding:5px 7px;text-align:left}
th{background:var(--gray-lt);font-weight:600;font-size:11px}
td input,td select{padding:3px 5px;font-size:12px;border:0;background:transparent}
td input:focus,td select:focus{outline:1px solid var(--accent);background:#fff}
.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.section-title{font-size:14px;font-weight:700;margin:0 0 10px;display:flex;align-items:center;gap:8px}
.btn{padding:6px 12px;border:1px solid var(--border);border-radius:5px;background:#fff;font-size:12px}
.btn:hover{background:var(--gray-lt)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#6d28d9}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-danger{color:var(--ng);border-color:#fecaca}
.btn-danger:hover{background:#fee2e2}
.row{display:flex;gap:8px;align-items:center}
.right{margin-left:auto}
.muted{color:var(--gray);font-size:11px}
.ok{color:var(--ok);font-weight:600}
.ng{color:var(--ng);font-weight:600}
.warn{color:var(--warn);font-weight:600}

/* ❓ ヘルプボタン */
.help{display:inline-block;width:16px;height:16px;line-height:16px;text-align:center;border-radius:50%;background:var(--gray-lt);color:var(--gray);font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);user-select:none;vertical-align:middle}
.help:hover{background:var(--accent-lt);color:var(--accent);border-color:var(--accent)}

/* ヘッダー */
#header{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;padding:8px 14px;display:flex;align-items:center;gap:10px}
#header h1{margin:0;font-size:16px;font-weight:700}
#header .sub{font-size:11px;opacity:.85}
.ver{font-size:10px;opacity:.7;padding:2px 6px;background:rgba(255,255,255,.18);border-radius:4px}

/* トップタブ */
#tabs{background:#fff;border-bottom:1px solid var(--border);display:flex;padding:0 8px}
.tab-btn{padding:10px 14px;border:0;background:transparent;font-size:13px;font-weight:600;color:var(--gray);border-bottom:3px solid transparent;border-radius:0}
.tab-btn:hover{color:#111}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* 期間バー */
#periodbar{background:#fff;border-bottom:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;gap:10px;font-size:12px}
#periodbar input[type=month]{width:130px}

/* レイアウト */
#main{display:flex;min-height:calc(100vh - 110px)}
.sidebar{width:200px;flex:none;background:#fff;border-right:1px solid var(--border);padding:8px 6px;overflow-y:auto}
.sidebar button{display:block;width:100%;text-align:left;padding:7px 9px;border:0;background:transparent;font-size:12px;border-radius:5px;color:#374151;border-left:3px solid transparent;margin-bottom:1px}
.sidebar button:hover{background:var(--gray-lt)}
.sidebar button.active{background:var(--accent-lt);color:var(--accent);font-weight:700;border-left-color:var(--accent)}
.content{flex:1;padding:14px;overflow-x:auto}

/* パネル */
.panel{display:none}
.panel.active{display:block}

/* グリッド */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi{background:#f9fafb;border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.kpi .lbl{font-size:11px;color:var(--gray)}
.kpi .val{font-size:18px;font-weight:700;margin-top:3px}
.kpi .delta{font-size:11px;margin-top:2px}

/* ヘルプモーダル */
#hbd{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:9999}
#hbd.show{display:flex}
#hbox{background:#fff;border-radius:10px;padding:18px 20px;max-width:520px;width:92%;max-height:80vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)}
#hbox h3{margin:0 0 10px;font-size:15px;color:var(--accent)}
#hbox .body{font-size:12px;line-height:1.7;color:#374151}
#hbox .close{margin-top:14px;text-align:right}

/* 保存インジケータ */
#bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;gap:10px;font-size:11px}
.savemark{color:var(--gray)}
.savemark.saved{color:var(--ok)}

@media (max-width:780px){
  .sidebar{width:140px}
  .grid-2,.grid-3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="header">
  <h1>経営計画管理システム</h1>
  <span class="sub">ローソン松本新村店</span>
  <span class="ver" id="ver">v25.0</span>
  <span class="right muted" id="dateinfo"></span>
</div>

<div id="tabs">
  <button class="tab-btn active" data-g="input"   onclick="goTab('input')">📥 入力</button>
  <button class="tab-btn"        data-g="monthly" onclick="goTab('monthly')">📅 月の計画</button>
  <button class="tab-btn"        data-g="weekly"  onclick="goTab('weekly')">📆 週の計画</button>
  <button class="tab-btn"        data-g="files"   onclick="goTab('files')">📁 ファイル</button>
</div>

<div id="periodbar">
  <label>📅 計画月</label>
  <input type="month" id="planMonth" onchange="onPlanMonthChange()">
  <span class="muted" id="periodInfo">—</span>
  <span class="right muted">金額単位: 円</span>
</div>

<div id="main">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="content"></main>
</div>

<div id="bottom">
  <button class="btn btn-sm" onclick="exportJSON()">↓ エクスポート</button>
  <label class="btn btn-sm" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px">↑ インポート<input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)"></label>
  <span class="right savemark" id="saveMark">未保存</span>
  <button class="btn btn-primary btn-sm" onclick="save()">💾 保存</button>
</div>

<!-- ヘルプモーダル -->
<div id="hbd" onclick="if(event.target.id==='hbd')closeHelp()">
  <div id="hbox">
    <h3 id="htitle"></h3>
    <div class="body" id="hbody"></div>
    <div class="close"><button class="btn btn-sm" onclick="closeHelp()">閉じる</button></div>
  </div>
</div>

<script>
/* =====================================================================
   経営計画管理システム v25.0  — 12 入力 / 月3 + 週5 出力
   設計方針: シンプル / 重複なし / 説明はすべて ❓ ボタンに収納
   ===================================================================== */

const APP_VERSION='v25.0';
document.getElementById('ver').textContent=APP_VERSION;
document.getElementById('dateinfo').textContent=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

/* ---------- ヘルプテキスト ---------- */
const HELP={
  // 入力
  seisan:{t:'精算書の使い方',b:'本部精算書（損益計算書）の数値を月1回入力します。<br><br><b>自動計算</b>:<br>・売上原価＝期首+仕入−割戻−期末<br>・総売上原価＝売上原価−見切処分−棚卸ロス<br>・粗利＝売上+その他収入−総売上原価<br>・FC収入＝粗利−ローソンチャージ<br>・店利益＝FC収入−営業費計+雑益計<br><br><b>雑益計スマート判定</b>: 4030 が大きい場合、本部負担分との二重計上を避けるため 4030 単独を採用します。'},
  zennen:{t:'前年比（日販・客数）',b:'前年同月の日販・客数・客単価を入力。月次計画の前年比指標として使用されます。<br><br><b>客単価</b>＝売上÷客数 が自動計算されます。'},
  monthSessaku:{t:'月の施策',b:'お店作り冊子①②から、当月の重点施策を登録します。<br><br>本部施策／店舗独自施策の区別、期待効果、期間を入力。<br>これが週次の売場レイアウトの素材になります。'},
  catJisseki:{t:'カテゴリ別実績',b:'直近4週分の週次お店づくりレポートから、カテゴリ別の売上実績を集計します。<br><br>月次計画の前月実績ベースになります。'},
  shohousen:{t:'処方箋（発注ドライバ確認表）',b:'本部処方箋に記載された各カテゴリの<b>標準ドライバ値</b>（平日/土日）を登録します。<br><br>週次の AICO ドライバ判定で、店舗設定値と比較して 🟢処方箋通 / 🟠上方修正 を自動判定します。'},
  aicoShien:{t:'AICOカテゴリ本部支援ルール',b:'世界一大作戦の本部支援条件メモ。カテゴリ前年比達成ティアに応じた支援額の算出ルールを記録します。<br><br>詳細PDF: <code>その他/マニュアル・ルール・管理/処方箋/世界一大作戦_本部支援条件確認レポート.pdf</code>'},
  cnKeiyaku:{t:'Cn契約本部支援計算',b:'FC-Cn / FC-5Cn のチャージ・最低保証・本部支援を契約条件通りに試算します。<br><br><b>スライド3段階（FC-Cn・24h）</b>:<br>・〜300万: 45%<br>・〜450万: 70%<br>・450万〜: 60%<br>・FC-5Cn は +1%<br>・24h未満は +3%'},
  gaibu:{t:'毎週の外部要因',b:'天気・イベント・競合動向・売上補正係数を週単位（火→月）で記録します。<br><br>これが「週の計画 → 外部状況カレンダー」に表示されます。<br><br><b>補正係数の目安</b>:<br>・雨 -3〜5% / 猛暑 アイス+20%・ホット麺-15%<br>・連休 +10〜30% / 花火・桜 +20%'},
  aicoLogic:{t:'AICOシステム発注ロジック',b:'AICOロジック・閾値・カテゴリルールのメモ。判定の参照に使います。<br><br>参照: <code>その他/マニュアル・ルール・管理/発注システムロジック/AICO発注ロジック/</code>'},
  storeLogic:{t:'店舗発注システムロジック',b:'店舗独自の発注ルール・在庫水準・補充タイミング等のメモ。<br><br>参照: <code>その他/マニュアル・ルール・管理/発注システムロジック/発注業務.pdf</code>'},
  tetteiKijun:{t:'3つの徹底基準',b:'3つの徹底（Q品揃え/S鮮度/C接客）の基準値を登録します。<br><br>これが週次の徹底実績判定の元になります。<br><br>参照: <code>その他/マニュアル・ルール・管理/3つの徹底/</code>'},
  tetteiJisseki:{t:'3つの徹底実績',b:'火→月の各日に徹底1〜3の達成状況（◯/△/✗）を記録。<br><br>週次サマリで達成率が表示されます。'},
  // 月の計画
  mSeisan:{t:'月の計画 - 精算書項目',b:'当月の経営計画を精算書フォーマットで作成します。<br><br>売上目標→粗利目標→チャージ→FC収入→営業費→雑益→<b>店利益</b> までを自動計算。<br><br>チャージはスライド3段階で自動算出。'},
  mCat:{t:'月の計画 - カテゴリ別',b:'各カテゴリの月次売上・粗利目標を入力。月計と精算書の売上が突合されます。'},
  mOrder:{t:'月の計画 - 発注リスト（週別）',b:'当月内の各週で発注すべき重点商品・数量を登録します。<br><br>週ごとに分けて管理することで、施策と発注タイミングを連動させます。'},
  // 週の計画
  wCat:{t:'週の計画 - カテゴリ別',b:'月次計画 ÷ 4 を基準に、直近実績と外部要因で当週を補正。<br><br>各カテゴリの「月次/4 → 直近実績 → 当週計画 → 補正理由」を記録。'},
  wLayout:{t:'週の計画 - 売場レイアウト',b:'エンド1/2/3/レジ前 の配置と発注数を計画。<br><br>月の施策（入力③）から該当する施策を選んで配置します。'},
  wAico:{t:'週の計画 - AICOドライバ判定',b:'処方箋値（入力⑤）と当週の店舗設定ドライバを比較し、自動判定します。<br><br>🟢 <b>処方箋通</b>: 全7日OK → 標準支援対象<br>🟠 <b>上方修正</b>: 1日でも処方箋超過 → 超過分は加盟店負担'},
  wTettei:{t:'週の計画 - 3つの徹底',b:'基準値（入力⑪）と実績（入力⑫）のサマリ。<br><br>各徹底の週次達成率を表示。'},
  wCal:{t:'週の計画 - 外部状況カレンダー',b:'毎週の外部要因（入力⑧）を当週分だけ抜き出してカレンダー形式で表示。'},
  // ファイル
  files:{t:'ファイル管理',b:'PDF・画像ファイルの参照リンクを管理します。<br><br>※ 実体はGoogle Driveに置き、ここはパスのリンク集として使います。'}
};
function showHelp(k){
  const h=HELP[k];if(!h)return;
  document.getElementById('htitle').textContent=h.t;
  document.getElementById('hbody').innerHTML=h.b;
  document.getElementById('hbd').classList.add('show');
}
function closeHelp(){document.getElementById('hbd').classList.remove('show');}
function helpBtn(k){return `<span class="help" onclick="showHelp('${k}')" title="説明を表示">?</span>`;}

/* ---------- データ ---------- */
const STORAGE_KEY='keiei_v25_data';
const DEFAULT_CATS=['米飯','麺類','ファストフード','サンドイッチ','ベーカリー','デザート','牛乳・乳飲料','飲料','酒類','加工食品','菓子','雑貨・タバコ等'];
const SEISAN_FIELDS=[
  // [code, key, label, type] type: 'income'/'cogs'/'charge'/'op'/'misc'
  ['4010','uriage','商品売上高','income'],
  ['4020','sonota','その他営業収入','income'],
  ['5050','ki_hatsu','期首商品棚卸高','cogs'],
  ['5010','shiire','商品仕入高','cogs'],
  ['5020','warimodoshi','仕入割戻高','cogs'],
  ['5060','ki_sue','期末商品棚卸高','cogs'],
  ['5030','mikiri_uka','見切・処分高（売価）','cogs'],
  ['5040','tana_loss','棚卸ロス','cogs'],
  ['6000','charge','ローソンチャージ','charge'],
  ['6010','kyuyo','パートタイマー給与','op'],
  ['6020','fukuri','法定福利費','op'],
  ['6030','mikiri_op','見切・処分（営業費側）','op'],
  ['6040','loss_op','棚卸ロス（営業費側）','op'],
  ['6050','shomohin','消耗品費','op'],
  ['6060','hosou','包装資材費','op'],
  ['6070','seisou','清掃費','op'],
  ['6080','genkin','現金過不足','op'],
  ['6100','denwa','電話料','op'],
  ['6110','setsubi_shu','設備修繕料','op'],
  ['6120','ippan','一般維持費','op'],
  ['6130','konetsu','水道光熱費','op'],
  ['6140','risoku','支払利息','op'],
  ['6150','zappi','雑費','op'],
  ['6160','songai','損害保険料','op'],
  ['6170','hikazei','非課税経費','op'],
  ['4030','zatsueki','雑益（純額）','misc'],
  ['4040','mikiri_shien','見切・処分本部負担額','misc'],
  ['4050','denki_shien','光熱費本部負担額','misc']
];

let state=loadState();
function loadState(){
  try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY));if(s)return s;}catch(e){}
  return blankState();
}
function blankState(){
  const m=currentPlanMonth();
  return {
    planMonth:m,
    byMonth:{[m]:blankMonth()},
    contract:{type:'FC-Cn',h24:true},
    aicoShienMemo:'',aicoLogicMemo:'',storeLogicMemo:'',
    tetteiKijun:{kijun:['推奨棚割100%遵守','期限切れ0件','声出し・笑顔'],houhou:['目視','POS/目視','目視']},
    files:[]
  };
}
function blankMonth(){
  const z=()=>0;const sf={};SEISAN_FIELDS.forEach(f=>sf[f[1]]=0);
  return{
    seisan:sf,eigyoNissu:30,
    zennen:{nippanPrev:0,nippanCur:0,kyakuPrev:0,kyakuCur:0},
    sessaku:[],   // [{name,cat,kikan,kouka,kubun}]
    catJisseki:DEFAULT_CATS.map(c=>({cat:c,w1:0,w2:0,w3:0,w4:0})),
    shohousen:DEFAULT_CATS.slice(0,8).map(c=>({cat:c,wd:1.0,we:1.2})),
    gaibu:initWeekDates().map(d=>({date:d,tenki:'',kion:'',event:'',kyogo:'',hosei:'',shisaku:''})),
    tetteiJisseki:initWeekDates().map(d=>({date:d,t1:'',t2:'',t3:'',memo:''})),
    plan:{seisan:{...sf},cats:DEFAULT_CATS.map(c=>({cat:c,uriage:0,arari:0})),orders:[]},
    weekly:{
      cats:DEFAULT_CATS.map(c=>({cat:c,plan:0,reason:''})),
      layout:[{loc:'エンド1',item:'',num:0,kouka:''},{loc:'エンド2',item:'',num:0,kouka:''},{loc:'エンド3',item:'',num:0,kouka:''},{loc:'レジ前',item:'',num:0,kouka:''}],
      aicoSet:DEFAULT_CATS.slice(0,8).map(c=>({cat:c,wd:1.0,we:1.2,reason:''}))
    }
  };
}
function currentPlanMonth(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function initWeekDates(){
  const t=new Date();const day=t.getDay();
  const tueOff=(2-day+7)%7||((day===2)?0:7-day+2);
  const start=new Date(t.getFullYear(),t.getMonth(),t.getDate()+(day===2?0:tueOff));
  // 直近の火曜から7日
  return Array.from({length:7},(_,i)=>{
    const dt=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i);
    return dt.toISOString().slice(0,10);
  });
}
function getMonthData(){
  const m=state.planMonth;
  if(!state.byMonth[m])state.byMonth[m]=blankMonth();
  return state.byMonth[m];
}

/* ---------- 保存・エクスポート ---------- */
let saveTimer=null;
function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  const sm=document.getElementById('saveMark');sm.textContent='✓ 保存済';sm.classList.add('saved');
  clearTimeout(saveTimer);saveTimer=setTimeout(()=>{sm.textContent='—';sm.classList.remove('saved');},2000);
}
function autoSave(){save();}
function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`keiei_v25_${state.planMonth}.json`;a.click();
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{state=JSON.parse(r.result);save();render();alert('読み込み完了');}catch(err){alert('読み込みエラー: '+err.message);}};
  r.readAsText(f);
  e.target.value='';
}

/* ---------- 計算式（経営計画_計算ロジック.md 準拠）---------- */
function calcSeisan(s){
  const v=k=>+(s[k]||0);
  const baigen=v('ki_hatsu')+v('shiire')-v('warimodoshi')-v('ki_sue');     // 売上原価
  const totalBaigen=baigen-v('mikiri_uka')-v('tana_loss');                  // 総売上原価
  const arari=v('uriage')+v('sonota')-totalBaigen;                          // 粗利
  const fcShunyu=arari-v('charge');                                          // FC収入
  // 営業費計（16項目）
  const opKeys=['kyuyo','fukuri','mikiri_op','loss_op','shomohin','hosou','seisou','genkin','denwa','setsubi_shu','ippan','konetsu','risoku','zappi','songai','hikazei'];
  const opTotal=opKeys.reduce((a,k)=>a+v(k),0);
  // 雑益計スマート判定
  const z4030=v('zatsueki'),z4040=v('mikiri_shien'),z4050=v('denki_shien');
  let zatsuTotal;
  if(z4030>50000 && z4030>=z4040+z4050 && (z4040>0||z4050>0)){zatsuTotal=z4030;} // パターンB
  else{zatsuTotal=z4030+z4040+z4050;} // パターンA
  const tenrieki=fcShunyu-opTotal+zatsuTotal;
  const uribetsu=v('uriage')?v('mikiri_uka')/v('uriage')*100:0;
  return {baigen,totalBaigen,arari,fcShunyu,opTotal,zatsuTotal,tenrieki,uribetsu};
}
// チャージ スライド3段階
function calcCharge(arari,contract){
  const rates=contract.type==='FC-5Cn'?[0.46,0.71,0.61]:[0.45,0.70,0.60];
  const add=contract.h24?0:0.03;
  const r=[rates[0]+add,rates[1]+add,rates[2]+add];
  const tier1=Math.min(arari,3000000);
  const tier2=Math.max(0,Math.min(arari-3000000,1500000));
  const tier3=Math.max(0,arari-4500000);
  const c=tier1*r[0]+tier2*r[1]+tier3*r[2];
  return {charge:Math.round(c),tiers:[{n:tier1,r:r[0],c:tier1*r[0]},{n:tier2,r:r[1],c:tier2*r[1]},{n:tier3,r:r[2],c:tier3*r[2]}]};
}

    if(h)h.addEventListener('input',()=>{state.tetteiKijun.houhou[i-1]=h.value;autoSave();});
  });
};

/* ⑫ 3つの徹底実績 */
PANEL.tetteiJisseki=function(){
  const m=getMonthData();
  const wd=['日','月','火','水','木','金','土'];
  const opts=v=>['','◯','△','✗'].map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('');
  const rows=m.tetteiJisseki.map((r,i)=>{
    const d=r.date?new Date(r.date):null;
    return `<tr>
      <td><input type="date" value="${r.date}" onchange="updTJ(${i},'date',this.value);renderPanel()"></td>
      <td>${d?wd[d.getDay()]:''}</td>
      <td><select onchange="updTJ(${i},'t1',this.value)">${opts(r.t1)}</select></td>
      <td><select onchange="updTJ(${i},'t2',this.value)">${opts(r.t2)}</select></td>
      <td><select onchange="updTJ(${i},'t3',this.value)">${opts(r.t3)}</select></td>
      <td><input value="${r.memo||''}" onchange="updTJ(${i},'memo',this.value)"></td>
    </tr>`;
  }).join('');
  return `
  <div class="card">
    <div class="section-title">⑫ 3つの徹底実績 ${helpBtn('tetteiJisseki')}<button class="btn btn-sm right" onclick="resetTJ()">📅 当週分を初期化</button></div>
    <table>
      <thead><tr><th style="width:130px">日付</th><th style="width:40px">曜</th><th>徹底1</th><th>徹底2</th><th>徹底3</th><th>備考</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
};
function updTJ(i,k,v){getMonthData().tetteiJisseki[i][k]=v;autoSave();}
function resetTJ(){getMonthData().tetteiJisseki=initWeekDates().map(d=>({date:d,t1:'',t2:'',t3:'',memo:''}));autoSave();renderPanel();}

/* =====================================================================
   📅 月の計画
   ===================================================================== */
PANEL.mSeisan=function(){
  const m=getMonthData();
  const calc=calcSeisan(m.plan.seisan);
  const ch=calcCharge(calc.arari,state.contract);
  // 計画は精算書と同じ枠
  const groups={income:'売上・収入',cogs:'売上原価関連',op:'営業費（16項目）',misc:'雑益関連'};
  let body='';
  Object.keys(groups).forEach(g=>{
    body+=`<tr><th colspan="3" style="background:#f3e8ff;color:#6d28d9">${groups[g]}</th></tr>`;
    SEISAN_FIELDS.filter(f=>f[3]===g).forEach(([code,key,label])=>{
      body+=`<tr><td style="width:80px"><span class="muted">${code}</span></td><td>${label}</td><td style="width:140px"><input type="number" id="mp-${key}" value="${m.plan.seisan[key]||0}"></td></tr>`;
    });
  });
  return `
  <div class="card">
    <div class="section-title">月の計画 - 精算書項目 ${helpBtn('mSeisan')}<button class="btn btn-sm right" onclick="copyJissekiToplan()">📋 実績をコピー</button></div>
    <div class="grid-3" style="margin-bottom:10px">
      <div class="kpi"><div class="lbl">計画売上</div><div class="val">¥${fmt(m.plan.seisan.uriage+m.plan.seisan.sonota)}</div></div>
      <div class="kpi"><div class="lbl">計画粗利</div><div class="val">¥${fmt(calc.arari)}</div></div>
      <div class="kpi"><div class="lbl">計画店利益</div><div class="val" style="color:${calc.tenrieki>0?'var(--ok)':'var(--ng)'}">¥${fmt(calc.tenrieki)}</div></div>
    </div>
    <div class="row muted" style="margin-bottom:8px;font-size:11px">
      自動チャージ: ¥${fmt(ch.charge)} / 営業費計: ¥${fmt(calc.opTotal)} / 雑益計: ¥${fmt(calc.zatsuTotal)}
    </div>
    <table>${body}</table>
    <p class="muted" style="margin-top:6px">※ ローソンチャージ(6000) は粗利からスライド3段階で自動算出されるため、計画では入力不要です。</p>
  </div>`;
};
POSTRENDER.mSeisan=function(){
  const m=getMonthData();
  SEISAN_FIELDS.forEach(([_,k])=>{
    if(k==='charge')return;
    const el=document.getElementById('mp-'+k);
    if(el)el.addEventListener('input',()=>{m.plan.seisan[k]=+el.value||0;
      // チャージ自動更新
      const tmp=calcSeisan(m.plan.seisan);
      m.plan.seisan.charge=calcCharge(tmp.arari,state.contract).charge;
      autoSave();renderPanel();
    });
  });
};
function copyJissekiToplan(){
  if(!confirm('実績の値を計画にコピーしますか？（既存の計画は上書きされます）'))return;
  const m=getMonthData();
  m.plan.seisan={...m.seisan};
  const tmp=calcSeisan(m.plan.seisan);
  m.plan.seisan.charge=calcCharge(tmp.arari,state.contract).charge;
  autoSave();renderPanel();
}

PANEL.mCat=function(){
  const m=getMonthData();
  const rows=m.plan.cats.map((c,i)=>`<tr>
    <td><input value="${c.cat}" onchange="updMcat(${i},'cat',this.value)"></td>
    <td><input type="number" value="${c.uriage}" onchange="updMcat(${i},'uriage',+this.value);renderPanel()"></td>
    <td><input type="number" value="${c.arari}" onchange="updMcat(${i},'arari',+this.value);renderPanel()"></td>
    <td>${c.uriage?(c.arari/c.uriage*100).toFixed(1)+'%':'—'}</td>
    <td><button class="btn btn-sm btn-danger" onclick="delMcat(${i})">削除</button></td>
  </tr>`).join('');
  const sum=m.plan.cats.reduce((a,c)=>({u:a.u+(+c.uriage||0),g:a.g+(+c.arari||0)}),{u:0,g:0});
  return `
  <div class="card">
    <div class="section-title">月の計画 - カテゴリ別 ${helpBtn('mCat')}<button class="btn btn-sm right" onclick="addMcat()">＋カテゴリ</button></div>
    <table>
      <thead><tr><th>カテゴリ</th><th style="width:140px">計画売上</th><th style="width:140px">計画粗利</th><th style="width:80px">粗利率</th><th style="width:60px"></th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><th>合計</th><th style="text-align:right">¥${fmt(sum.u)}</th><th style="text-align:right">¥${fmt(sum.g)}</th><th>${sum.u?(sum.g/sum.u*100).toFixed(1)+'%':'—'}</th><th></th></tr></tfoot>
    </table>
    <p class="muted" style="margin-top:6px">精算書計画売上: ¥${fmt(m.plan.seisan.uriage)} / カテゴリ合計: ¥${fmt(sum.u)} ${m.plan.seisan.uriage===sum.u?'<span class="ok">✓ 一致</span>':'<span class="warn">差額 ¥'+fmt(m.plan.seisan.uriage-sum.u)+'</span>'}</p>
  </div>`;
};
function updMcat(i,k,v){getMonthData().plan.cats[i][k]=v;autoSave();}
function addMcat(){getMonthData().plan.cats.push({cat:'',uriage:0,arari:0});autoSave();renderPanel();}
function delMcat(i){getMonthData().plan.cats.splice(i,1);autoSave();renderPanel();}

PANEL.mOrder=function(){
  const m=getMonthData();
  const rows=m.plan.orders.map((o,i)=>`<tr>
    <td><select onchange="updMord(${i},'week',this.value)">
      ${[1,2,3,4].map(w=>`<option value="${w}" ${o.week===w?'selected':''}>第${w}週</option>`).join('')}
    </select></td>
    <td><input value="${o.item||''}" onchange="updMord(${i},'item',this.value)" placeholder="商品名"></td>
    <td><input value="${o.cat||''}" onchange="updMord(${i},'cat',this.value)" placeholder="カテゴリ"></td>
    <td><input type="number" value="${o.qty||0}" onchange="updMord(${i},'qty',+this.value)"></td>
    <td><input value="${o.note||''}" onchange="updMord(${i},'note',this.value)" placeholder="備考"></td>
    <td><button class="btn btn-sm btn-danger" onclick="delMord(${i})">削除</button></td>
  </tr>`).join('')||`<tr><td colspan="6" class="muted" style="text-align:center;padding:14px">発注リスト未登録</td></tr>`;
  return `
  <div class="card">
    <div class="section-title">月の計画 - 発注リスト（週別）${helpBtn('mOrder')}<button class="btn btn-sm right" onclick="addMord()">＋追加</button></div>
    <table>
      <thead><tr><th style="width:90px">週</th><th>商品名</th><th style="width:120px">カテゴリ</th><th style="width:90px">発注数</th><th>備考</th><th style="width:60px"></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
};
function updMord(i,k,v){getMonthData().plan.orders[i][k]=v;autoSave();}
function addMord(){getMonthData().plan.orders.push({week:1,item:'',cat:'',qty:0,note:''});autoSave();renderPanel();}
function delMord(i){getMonthData().plan.orders.splice(i,1);autoSave();renderPanel();}

/* =====================================================================
   📆 週の計画
   ===================================================================== */
PANEL.wCat=function(){
  const m=getMonthData();
  const rows=m.weekly.cats.map((c,i)=>{
    // 月計画/4 自動
    const mc=m.plan.cats.find(x=>x.cat===c.cat);
    const m4=mc?Math.round(mc.uriage/4):0;
    // 直近実績は catJisseki の 4週合計 / 4
    const cj=m.catJisseki.find(x=>x.cat===c.cat);
    const jisseki=cj?Math.round(((+cj.w1||0)+(+cj.w2||0)+(+cj.w3||0)+(+cj.w4||0))/4):0;
    return `<tr>
      <td><input value="${c.cat}" onchange="updWcat(${i},'cat',this.value);renderPanel()"></td>
      <td style="text-align:right">¥${fmt(m4)}</td>
      <td style="text-align:right">¥${fmt(jisseki)}</td>
      <td><input type="number" value="${c.plan}" onchange="updWcat(${i},'plan',+this.value);renderPanel()"></td>
      <td><input value="${c.reason||''}" onchange="updWcat(${i},'reason',this.value)" placeholder="補正理由"></td>
    </tr>`;
  }).join('');
  const sum=m.weekly.cats.reduce((a,c)=>a+(+c.plan||0),0);
  const sumM4=m.plan.cats.reduce((a,c)=>a+Math.round((+c.uriage||0)/4),0);
  return `
  <div class="card">
    <div class="section-title">週の計画 - カテゴリ別 ${helpBtn('wCat')}</div>
    <table>
      <thead><tr><th>カテゴリ</th><th style="width:120px">月計画/4</th><th style="width:120px">直近実績平均</th><th style="width:120px">当週計画</th><th>補正理由</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><th>合計</th><th style="text-align:right">¥${fmt(sumM4)}</th><th></th><th style="text-align:right">¥${fmt(sum)}</th><th></th></tr></tfoot>
    </table>
  </div>`;
};
function updWcat(i,k,v){getMonthData().weekly.cats[i][k]=v;autoSave();}

PANEL.wLayout=function(){
  const m=getMonthData();
  const rows=m.weekly.layout.map((l,i)=>`<tr>
    <td><b>${l.loc}</b></td>
    <td><input value="${l.item||''}" onchange="updWlay(${i},'item',this.value)" placeholder="施策名 / 商品"></td>
    <td><input type="number" value="${l.num||0}" onchange="updWlay(${i},'num',+this.value)" placeholder="個/日"></td>
    <td><input value="${l.kouka||''}" onchange="updWlay(${i},'kouka',this.value)" placeholder="期待効果"></td>
  </tr>`).join('');
  return `
  <div class="card">
    <div class="section-title">週の計画 - 売場レイアウト ${helpBtn('wLayout')}<button class="btn btn-sm right" onclick="addWlay()">＋エリア追加</button></div>
    <table>
      <thead><tr><th style="width:110px">エリア</th><th>施策・商品</th><th style="width:100px">発注数</th><th style="width:200px">期待効果</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${m.sessaku.length?`<p class="muted" style="margin-top:6px">参考: 入力③で登録済の施策 — ${m.sessaku.map(s=>s.name).filter(x=>x).join(' / ')||'なし'}</p>`:''}
  </div>`;
};
function updWlay(i,k,v){getMonthData().weekly.layout[i][k]=v;autoSave();}
function addWlay(){getMonthData().weekly.layout.push({loc:'追加エリア',item:'',num:0,kouka:''});autoSave();renderPanel();}

PANEL.wAico=function(){
  const m=getMonthData();
  const rows=m.shohousen.map((sho,i)=>{
    const set=m.weekly.aicoSet[i]||{cat:sho.cat,wd:sho.wd,we:sho.we,reason:''};
    if(!m.weekly.aicoSet[i]){m.weekly.aicoSet[i]=set;}
    const ok=set.wd<=sho.wd && set.we<=sho.we;
    return `<tr>
      <td>${sho.cat}</td>
      <td><input type="number" step="0.1" value="${set.wd}" onchange="updWaico(${i},'wd',+this.value);renderPanel()"></td>
      <td><input type="number" step="0.1" value="${set.we}" onchange="updWaico(${i},'we',+this.value);renderPanel()"></td>
      <td>${sho.wd}</td>
      <td>${sho.we}</td>
      <td>${ok?'<span class="ok">🟢処方箋通</span>':'<span class="warn">🟠上方修正</span>'}</td>
      <td><input value="${set.reason||''}" onchange="updWaico(${i},'reason',this.value)" placeholder="${ok?'-':'上方修正の理由'}"></td>
    </tr>`;
  }).join('');
  return `
  <div class="card">
    <div class="section-title">週の計画 - AICOドライバ判定 ${helpBtn('wAico')}</div>
    <table>
      <thead><tr><th>カテゴリ</th><th style="width:80px">設定(平日)</th><th style="width:80px">設定(土日)</th><th style="width:80px">処方箋(平日)</th><th style="width:80px">処方箋(土日)</th><th style="width:120px">判定</th><th>理由</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
};
function updWaico(i,k,v){
  const m=getMonthData();
  if(!m.weekly.aicoSet[i])m.weekly.aicoSet[i]={cat:m.shohousen[i]?.cat||'',wd:1,we:1,reason:''};
  m.weekly.aicoSet[i][k]=v;autoSave();
}

PANEL.wTettei=function(){
  const m=getMonthData();
  const k=state.tetteiKijun;
  const j=m.tetteiJisseki;
  const tally=[0,0,0];j.forEach(r=>{['t1','t2','t3'].forEach((t,idx)=>{if(r[t]==='◯')tally[idx]++;});});
  const cards=[1,2,3].map(i=>`
    <div class="kpi" style="text-align:left">
      <div style="font-weight:700;font-size:13px">徹底${i}（${['品揃え','鮮度','接客'][i-1]}）</div>
      <div class="muted" style="margin:4px 0">基準: ${k.kijun[i-1]||'<span class="warn">未設定</span>'}</div>
      <div class="muted">判定方法: ${k.houhou[i-1]||'—'}</div>
      <div style="font-size:22px;font-weight:700;color:var(--accent);margin-top:6px">${tally[i-1]}/${j.length} 日 達成</div>
    </div>
  `).join('');
  return `
  <div class="card">
    <div class="section-title">週の計画 - 3つの徹底 ${helpBtn('wTettei')}</div>
    <div class="grid-3">${cards}</div>
    <p class="muted" style="margin-top:10px">※ 基準は入力⑪、実績は入力⑫で編集します。</p>
  </div>`;
};

PANEL.wCal=function(){
  const m=getMonthData();
  const wd=['日','月','火','水','木','金','土'];
  const rows=m.gaibu.map(g=>{
    const d=g.date?new Date(g.date):null;
    return `<tr>
      <td>${g.date||''}</td>
      <td>${d?wd[d.getDay()]:''}</td>
      <td>${g.tenki||''}</td>
      <td>${g.kion||''}</td>
      <td>${g.event||''}</td>
      <td>${g.kyogo||''}</td>
      <td style="text-align:right">${g.hosei||''}</td>
      <td>${g.shisaku||''}</td>
    </tr>`;
  }).join('')||`<tr><td colspan="8" class="muted" style="text-align:center;padding:14px">入力⑧で日付を登録してください</td></tr>`;
  return `
  <div class="card">
    <div class="section-title">週の計画 - 外部状況カレンダー ${helpBtn('wCal')}</div>
    <table>
      <thead><tr><th style="width:110px">日付</th><th style="width:40px">曜</th><th>天気</th><th>気温</th><th>イベント</th><th>競合</th><th style="width:80px">補正%</th><th>主要施策</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
};

/* =====================================================================
   📁 ファイル
   ===================================================================== */
PANEL.files=function(){
  const rows=state.files.map((f,i)=>`<tr>
    <td><input value="${f.name||''}" onchange="updFile(${i},'name',this.value)" placeholder="ファイル名"></td>
    <td><select onchange="updFile(${i},'type',this.value)">
      ${['精算書','お店作り冊子','処方箋','週次レポート','契約書','その他'].map(t=>`<option ${f.type===t?'selected':''}>${t}</option>`).join('')}
    </select></td>
    <td><input value="${f.path||''}" onchange="updFile(${i},'path',this.value)" placeholder="その他/精算書/精算書2026.5.pdf 等"></td>
    <td><input value="${f.note||''}" onchange="updFile(${i},'note',this.value)" placeholder="備考"></td>
    <td><button class="btn btn-sm btn-danger" onclick="delFile(${i})">削除</button></td>
  </tr>`).join('')||`<tr><td colspan="5" class="muted" style="text-align:center;padding:14px">ファイル未登録</td></tr>`;
  return `
  <div class="card">
    <div class="section-title">📁 ファイル管理 ${helpBtn('files')}<button class="btn btn-sm right" onclick="addFile()">＋追加</button></div>
    <table>
      <thead><tr><th>名前</th><th style="width:130px">種別</th><th>パス</th><th>備考</th><th style="width:60px"></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <p class="muted" style="margin-top:6px">※ 実体は Google Drive 上に置き、ここはパスのリンク集として管理します。</p>
  </div>`;
};
function updFile(i,k,v){state.files[i][k]=v;autoSave();}
function addFile(){state.files.push({name:'',type:'その他',path:'',note:''});autoSave();renderPanel();}
function delFile(i){state.files.splice(i,1);autoSave();renderPanel();}

/* =====================================================================
   起動
   ===================================================================== */
window.addEventListener('DOMContentLoaded',()=>{
  render();
});
</script>
